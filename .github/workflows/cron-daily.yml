name: Cron — daily cleanup

# Daily jobs that only need to run once per day. Today:
#   - /api/cron/cleanup-whatsapp-instances — deletes Evolution Go instances
#     that have been disconnected for 7+ days, freeing VPS capacity.
#
# If more daily jobs appear, add them as additional steps in this same
# workflow so we don't fan-out too many schedules.

on:
  schedule:
    # 03:00 UTC daily (00:00 Brasília) — off-peak for our customers.
    - cron: '0 3 * * *'
  # Manual trigger for testing.
  workflow_dispatch:

jobs:
  cleanup:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: POST /api/cron/cleanup-whatsapp-instances
        env:
          APP_URL: ${{ vars.APP_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          if [ -z "$APP_URL" ]; then
            echo "::error::APP_URL variable is not set (repo → Settings → Variables)"
            exit 1
          fi
          if [ -z "$CRON_SECRET" ]; then
            echo "::error::CRON_SECRET secret is not set (repo → Settings → Secrets)"
            exit 1
          fi
          curl --fail --silent --show-error \
               -X POST \
               -H "x-cron-secret: $CRON_SECRET" \
               "$APP_URL/api/cron/cleanup-whatsapp-instances"
